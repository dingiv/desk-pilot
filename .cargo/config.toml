# Project cargo config. Merges with ~/.cargo/config.toml (rsproxy mirror).
#
# IMPORTANT: this workspace pulls mistralrs + candle + sherpa — their release builds are
# memory-heavy (candle CUDA codegen can spike a single rustc to ~8GB). On this shared desktop
# (59GB RAM, but kasm VNC + Chrome + IDE share it) full -j16 parallelism OOM-swaps the desktop.
# So we cap build parallelism and bump codegen units to flatten the peak.
[build]
jobs = 4
# Native .so discovery at RUNTIME — "DLL-next-to-exe" for Linux.
# The binary bakes a $ORIGIN-relative RUNPATH so it finds <workspace>/lib/ with NO system
# ldconfig entry and NO LD_LIBRARY_PATH. Two entries cover cargo's two output depths:
#   - $ORIGIN/../../assets/lib      → bins at      target/<profile>/
#   - $ORIGIN/../../../assets/lib   → examples at  target/<profile>/examples/
# The sherpa .so themselves carry RPATH=[$ORIGIN], so transitive deps (libonnxruntime.so)
# resolve from the same dir. lib/ holds symlinks to the real prebuilt libs (see assets/sherpa).
# NOTE: changing rustflags invalidates the whole build cache (one-time full rebuild).
rustflags = [
    "-C",
    "codegen-units=16",
    "-C",
    "link-arg=-Wl,-rpath,$ORIGIN/../../assets/lib",
    "-C",
    "link-arg=-Wl,-rpath,$ORIGIN/../../../assets/lib",
]

[env]
CUDA_PATH = "/usr/local/cuda-13.2"
CUDA_ROOT = "/usr/local/cuda-13.2"
CUDA_HOME = "/usr/local/cuda-13.2"
CUDA_COMPUTE_CAP = "120"
# Point cudaforge (candle-kernels build) at the REAL nvcc path. /usr/local/bin/nvcc is a symlink
# to cuda-13.2, but cudaforge derives the toolkit root from nvcc's PARENT dir without resolving
# the symlink → gets /usr/local → include /usr/local/include (no cuda_runtime.h) → nvcc fails.
# cudaforge's find_nvcc() checks NVCC first, so this forces the correct /usr/local/cuda-13.2 root.
NVCC = "/usr/local/cuda-13.2/bin/nvcc"
# sherpa-onnx official crate BUILD-time lib discovery (so build.rs skips the github download,
# blocked here). Points at <workspace>/lib/ — the same dir the binary's RUNPATH resolves at
# runtime. lib/*.so are symlinks; repoint them to switch the active sherpa bundle:
#   - GPU (CUDA): assets/sherpa/sherpa-onnx-v1.13.4-cuda-12.x-cudnn-9.x-linux-x64-gpu/lib
#       (CUDA EP providers + omniparser/lib CUDA/cuDNN runtime libs symlinked in; providers
#        patched with RUNPATH=$ORIGIN). Then set aura.json `asr_provider: "cuda"`.
#   - CPU:        assets/sherpa/sherpa-onnx-v1.13.4-linux-x64-shared/lib
SHERPA_ONNX_LIB_DIR = "/workspaces/gui_agent/desk-pilot/assets/lib"

[alias]
# Legacy Stage1+2 bench (bin) — deprecated with the aura-core legacy code.
benchaura = "run -p audio-aura-core --features cuda,asr --bin stage12 --"
# Thin Stage1→Stage2 bench on the Pipeline composer (moved here from aura-asr).
benchlive = "run -p audio-aura-core --features cuda,asr --example stage12_live --"
# Full daemon (Pipeline + Stage3 rule trigger + socket skeleton).
aura = "run -p aura-daemon --features asr,cuda --"

scout = "run -p omni-scout --"
